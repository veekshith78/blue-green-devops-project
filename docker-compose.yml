services:
  blue:
    build:
      context: ./blue
    container_name: blue_app
    ports:
      - "5001:5000"

  green:
    build:
      context: ./green
    container_name: green_app
    ports:
      - "5002:5000"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green